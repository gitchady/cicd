services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cicd
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cicd"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
